<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prisme — Anomaly Insights</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <button class="btn-sidebar-toggle" onclick="window.app.toggleSidebar()" title="Historique">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="logo">Prisme</div>
      <span class="header-badge">Anomaly Insights</span>
    </div>
    <div class="header-right">
      <button class="btn-theme-toggle" onclick="window.app.toggleTheme()" title="Changer le thème">
        <svg class="icon-sun" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="btn-dashboard-toggle" onclick="window.app.toggleDashboard()" title="Dashboard">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </button>
      <button class="btn-new-chat" onclick="window.app.newConversation()">+ Nouvelle conversation</button>
    </div>
  </header>

  <!-- Dashboard panel -->
  <div id="dashboard-panel" class="dashboard-panel" style="display:none;">
    <div class="dashboard-content">
      <div class="dashboard-header">
        <h3>Dashboard</h3>
        <button class="btn-sidebar-close" onclick="window.app.toggleDashboard()">&times;</button>
      </div>
      <div id="dashboard-kpis" class="dashboard-kpis"></div>
    </div>
  </div>

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <h3>Historique</h3>
      <button class="btn-sidebar-close" onclick="window.app.toggleSidebar()">&times;</button>
    </div>
    <div id="conversation-list" class="conversation-list"></div>
  </aside>
  <div id="sidebar-backdrop" class="sidebar-backdrop" onclick="window.app.toggleSidebar()"></div>

  <!-- Chat area -->
  <div id="chat-container" class="chat-container">
    <div id="chat-messages" class="chat-messages">

      <!-- Welcome screen -->
      <div id="welcome" class="welcome">
        <h2>Bienvenue sur <span>Prisme</span></h2>
        <p>Interrogez vos données d'anomalies en langage naturel.</p>
        <div class="welcome-suggestions">
          <div class="suggestion">Combien d'anomalies par type d'objet métier ?</div>
          <div class="suggestion">Quelles sont les anomalies détectées en 2024 ?</div>
          <div class="suggestion">Top 10 des typologies les plus fréquentes</div>
          <div class="suggestion">Anomalies avec hotfix actif</div>
        </div>
      </div>

    </div>
  </div>

  <!-- Input area -->
  <div class="input-area">
    <div class="input-wrapper">
      <select id="model-select" class="model-select" title="Choisir le modèle">
        <option value="qwen3.5:9b" selected>Qwen 3.5 (local)</option>
        <option value="mistral-small-latest">Mistral Small</option>
        <option value="mistral-large-latest">Mistral Large</option>
      </select>
      <textarea
        id="message-input"
        placeholder="Posez une question sur les anomalies..."
        rows="1"
      ></textarea>
      <button id="send-btn" class="btn-send" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
